<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Success at Sage — profile picture</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #06060f;
    --violet: #a78bfa;
    --blue: #60a5fa;
    --green: #34d399;
  }
  html, body { margin: 0; padding: 0; background: transparent; }
  body {
    width: 1080px;
    height: 1080px;
    font-family: "Outfit", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    position: relative;
    width: 1080px;
    height: 1080px;
    /* Base radial so Instagram's circle crop looks intentional */
    background:
      radial-gradient(circle at 30% 20%, rgba(167, 139, 250, 0.35), transparent 55%),
      radial-gradient(circle at 75% 80%, rgba(52, 211, 153, 0.22), transparent 55%),
      radial-gradient(circle at 85% 25%, rgba(96, 165, 250, 0.25), transparent 50%),
      linear-gradient(135deg, #0a0a1f 0%, #06060f 100%);
    overflow: hidden;
  }
  /* Subtle grid texture for depth */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 90px 90px;
    mask-image: radial-gradient(circle at 50% 50%, black 40%, transparent 75%);
  }
  .mark {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .monogram {
    font-size: 640px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.06em;
    background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 50%, #34d399 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 120px rgba(124, 58, 237, 0.25);
    position: relative;
    transform: translateY(-12px);
  }
  /* The gradient blur glow behind the S */
  .glow {
    position: absolute;
    width: 680px;
    height: 680px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124, 58, 237, 0.35) 0%, transparent 60%);
    filter: blur(80px);
    z-index: 0;
  }
  .sub {
    position: relative;
    z-index: 2;
    margin-top: 24px;
    font-size: 64px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: rgba(255, 255, 255, 0.85);
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="grid"></div>
    <div class="mark">
      <div class="glow"></div>
      <div class="monogram" style="z-index: 2;">S</div>
    </div>
  </div>
</body>
</html>
