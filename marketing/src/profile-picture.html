<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Success at HS — profile picture</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=block" rel="stylesheet" />
<style>
  :root {
    --bg: #06060f;
    --bg-2: #0a0a1f;
    --violet-400: #a78bfa;
    --blue-400: #60a5fa;
    --green-400: #34d399;
    --amber-400: #fbbf24;
    --text: #ffffff;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: #06060f;
    overflow: hidden;
  }
  body {
    width: 1080px;
    height: 1080px;
    font-family: "Outfit", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    position: relative;
    width: 1080px;
    height: 1080px;
    background:
      radial-gradient(circle at 30% 20%, rgba(167, 139, 250, 0.40), transparent 55%),
      radial-gradient(circle at 75% 80%, rgba(52, 211, 153, 0.22), transparent 55%),
      radial-gradient(circle at 85% 25%, rgba(96, 165, 250, 0.28), transparent 50%),
      linear-gradient(135deg, #0a0a1f 0%, #06060f 100%);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 90px 90px;
    mask-image: radial-gradient(circle at 50% 50%, black 42%, transparent 78%);
  }
  .glow {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 820px;
    height: 820px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124, 58, 237, 0.45) 0%, transparent 58%);
    filter: blur(90px);
  }

  /* Hero wordmark — stacked and centered.
     line-height: 1.2 is deliberate — with background-clip: text on the
     gradient line below, anything outside the line-box (like the "g"
     descender) has no background rectangle to sample, so it renders
     transparent. 1.2 gives the descender its own row of pixels to fill. */
  .hero {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.2;
    padding: 0 80px;
  }
  .hero .success {
    font-size: 220px;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--text);
    text-shadow: 0 8px 48px rgba(167, 139, 250, 0.25);
  }
  .hero .at-sage {
    font-size: 220px;
    font-weight: 800;
    letter-spacing: -0.04em;
    /* Extra bottom padding extends the gradient background box past the
       line-box so the "g" descender actually has pixels to clip against. */
    padding-bottom: 0.12em;
    background: linear-gradient(135deg, #c4b5fd 0%, #a78bfa 25%, #60a5fa 55%, #34d399 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* Corner ornaments — tiny crosshair marks for an "emblem" feel */
  .corner {
    position: absolute;
    width: 60px;
    height: 60px;
    border: 2px solid rgba(255, 255, 255, 0.14);
    z-index: 2;
  }
  .corner.tl { top: 56px; left: 56px; border-right: 0; border-bottom: 0; }
  .corner.tr { top: 56px; right: 56px; border-left: 0; border-bottom: 0; }
  .corner.bl { bottom: 56px; left: 56px; border-right: 0; border-top: 0; }
  .corner.br { bottom: 56px; right: 56px; border-left: 0; border-top: 0; }
</style>
<script>
  // Signal to headless Chrome that fonts are fully loaded before screenshot.
  // Without this, the renderer can race the webfont and fall back to a
  // sans-serif with different metrics (clipped descenders, wrong kerning).
  document.fonts.ready.then(() => { document.body.dataset.ready = "1"; });
</script>
</head>
<body>
  <div class="card">
    <div class="grid"></div>
    <div class="glow"></div>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="hero">
      <div class="success">Success</div>
      <div class="at-sage">at&nbsp;Sage</div>
    </div>
  </div>
</body>
</html>
