<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Launch announcement</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="_shared.css" />
<style>
  body { width: 1080px; height: 1080px; }
  .canvas {
    position: relative;
    width: 1080px; height: 1080px;
    overflow: hidden;
    padding: 80px;
    display: flex;
    flex-direction: column;
  }
  .top-row {
    display: flex; justify-content: space-between; align-items: center;
    z-index: 2;
  }
  .wordmark {
    font-size: 28px; font-weight: 700; letter-spacing: -0.01em;
    color: var(--text);
  }
  .wordmark .dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    background: linear-gradient(135deg, var(--violet-400), var(--blue-400));
    margin-right: 10px; vertical-align: middle; transform: translateY(-2px);
  }
  .hero {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    z-index: 2; position: relative;
  }
  .badge {
    margin-bottom: 40px;
  }
  .prize {
    font-size: 44px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: -0.01em;
    margin-bottom: 16px;
  }
  .prize strong { color: var(--amber-400); font-weight: 800; }
  .headline {
    font-size: 148px;
    font-weight: 800;
    letter-spacing: -0.045em;
    line-height: 0.95;
    margin-bottom: 44px;
  }
  .headline .num {
    font-size: 240px;
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -0.06em;
    display: block;
  }
  .sub {
    font-size: 36px; font-weight: 500;
    color: var(--text-dim);
    line-height: 1.35;
    max-width: 720px;
  }
  .sub b { color: var(--text); font-weight: 700; }
  .bottom-row {
    display: flex; justify-content: space-between; align-items: flex-end;
    z-index: 2;
  }
  .url {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 30px; font-weight: 500;
    color: var(--text);
  }
  .url .arrow { color: var(--violet-400); margin-right: 12px; }
  .deadline {
    text-align: right;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .deadline b { display: block; color: var(--text); font-size: 30px; letter-spacing: -0.01em; text-transform: none; margin-top: 4px; }

  /* Big glow behind the number */
  .glow {
    position: absolute;
    width: 900px; height: 900px;
    left: -10%; top: 15%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124, 58, 237, 0.22) 0%, transparent 55%);
    filter: blur(40px);
    z-index: 0;
  }
</style>
</head>
<body class="brand-bg">
  <div class="canvas">
    <div class="brand-grid"></div>
    <div class="glow"></div>

    <div class="top-row">
      <div class="wordmark"><span class="dot"></span>Success at Sage</div>
      <div class="pill"><span class="pill-dot"></span>Launching May 1</div>
    </div>

    <div class="hero">
      <div class="prize">Top contributor wins</div>
      <div class="headline">
        <span class="num gradient-text">$50</span>
        Amazon gift card
      </div>
      <div class="sub">
        Upload your <b>AP&nbsp;review notes</b>, finals study guides, or practice tests.
        Every approved submission ranks you on the leaderboard. Zero competition right now.
      </div>
    </div>

    <div class="bottom-row">
      <div class="url"><span class="arrow">→</span>successatsage.com</div>
      <div class="deadline">Contest ends<b>May 31, 2026</b></div>
    </div>
  </div>
</body>
</html>
