<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Leaderboard update</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="_shared.css" />
<style>
  body { width: 1080px; height: 1080px; }
  .canvas {
    position: relative;
    width: 1080px; height: 1080px;
    overflow: hidden;
    padding: 80px;
    display: flex;
    flex-direction: column;
  }
  .top-row {
    display: flex; justify-content: space-between; align-items: center;
    z-index: 2;
  }
  .wordmark {
    font-size: 28px; font-weight: 700; letter-spacing: -0.01em;
    color: var(--text);
  }
  .wordmark .dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    background: linear-gradient(135deg, var(--violet-400), var(--blue-400));
    margin-right: 10px; vertical-align: middle; transform: translateY(-2px);
  }
  .heading {
    margin-top: 56px;
    z-index: 2;
  }
  .kicker {
    font-size: 22px; font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 18px;
  }
  .title {
    font-size: 92px; font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .title .accent { color: var(--amber-400); }

  .board {
    margin-top: 56px;
    z-index: 2;
    display: flex; flex-direction: column; gap: 18px;
  }
  .row {
    display: flex; align-items: center; gap: 28px;
    padding: 28px 36px;
    border-radius: 22px;
  }
  .rank {
    font-family: "Geist Mono", monospace;
    font-size: 44px; font-weight: 600;
    color: var(--text-faint);
    width: 80px;
  }
  .name {
    flex: 1;
    font-size: 48px; font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .count {
    font-size: 38px; font-weight: 600;
    color: var(--text-dim);
    font-family: "Geist Mono", monospace;
  }
  .row.gold {
    background: linear-gradient(135deg, rgba(251, 191, 36, 0.14), rgba(251, 191, 36, 0.04));
    border: 1px solid rgba(251, 191, 36, 0.28);
  }
  .row.gold .rank { color: var(--amber-400); }
  .row.gold .medal { font-size: 52px; margin-right: 4px; }
  .row.gold .count { color: var(--amber-400); }
  .row.silver { background: var(--glass-bg); border: 1px solid var(--glass-border); }
  .row.bronze { background: var(--glass-bg); border: 1px solid var(--glass-border); }
  .row.empty {
    background: transparent;
    border: 1px dashed rgba(255, 255, 255, 0.12);
    color: var(--text-faint);
  }
  .row.empty .rank, .row.empty .name, .row.empty .count { color: var(--text-faint); }
  .row.empty .name { font-weight: 500; font-style: italic; }

  .bottom-row {
    margin-top: auto;
    display: flex; justify-content: space-between; align-items: flex-end;
    z-index: 2;
  }
  .prize-box {
    display: flex; align-items: center; gap: 16px;
    padding: 20px 28px;
    border-radius: 18px;
  }
  .prize-amount {
    font-size: 52px; font-weight: 900; letter-spacing: -0.03em;
  }
  .prize-label {
    font-size: 18px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-faint);
    line-height: 1.3;
  }
  .prize-label b { display: block; color: var(--text); letter-spacing: -0.01em; text-transform: none; font-size: 24px; font-weight: 700; margin-top: 2px; }
  .url {
    font-family: "Geist Mono", monospace;
    font-size: 26px; font-weight: 500;
    color: var(--text);
    text-align: right;
  }
  .url .arrow { color: var(--violet-400); margin-right: 10px; }
  .url-sub { font-size: 18px; color: var(--text-faint); margin-top: 4px; letter-spacing: 0.1em; text-transform: uppercase; }

  .glow {
    position: absolute;
    width: 800px; height: 800px;
    right: -15%; top: -15%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124, 58, 237, 0.18) 0%, transparent 55%);
    filter: blur(40px);
    z-index: 0;
  }
</style>
</head>
<body class="brand-bg">
  <div class="canvas">
    <div class="brand-grid"></div>
    <div class="glow"></div>

    <div class="top-row">
      <div class="wordmark"><span class="dot"></span>Success at Sage</div>
      <div class="pill pill-amber"><span class="pill-dot"></span>Leaderboard · May</div>
    </div>

    <div class="heading">
      <div class="kicker">This month's standings</div>
      <div class="title">Who's winning <span class="accent">$50</span></div>
    </div>

    <div class="board">
      <div class="row gold">
        <div class="rank">1</div>
        <div class="name">— placeholder name —</div>
        <div class="count">— uploads</div>
      </div>
      <div class="row silver">
        <div class="rank">2</div>
        <div class="name">— placeholder name —</div>
        <div class="count">— uploads</div>
      </div>
      <div class="row bronze">
        <div class="rank">3</div>
        <div class="name">— placeholder name —</div>
        <div class="count">— uploads</div>
      </div>
      <div class="row empty">
        <div class="rank">4</div>
        <div class="name">your name here</div>
        <div class="count">0 uploads</div>
      </div>
    </div>

    <div class="bottom-row">
      <div class="prize-box glass">
        <div class="prize-amount gradient-text">$50</div>
        <div class="prize-label">Top contributor<b>May 31 payout</b></div>
      </div>
      <div>
        <div class="url"><span class="arrow">→</span>successatsage.com</div>
        <div class="url-sub">Upload. Rank. Win.</div>
      </div>
    </div>
  </div>
</body>
</html>
